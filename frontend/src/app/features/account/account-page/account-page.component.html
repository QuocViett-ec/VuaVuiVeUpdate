<main class="section">
  <div class="container" style="max-width:1100px">
    <div class="title"><h2>Tai khoan</h2></div>

    <div class="account-tabs">
      <nav class="account-nav">
        <button class="account-item" [class.active]="tab() === 'profile'" (click)="tab.set('profile')">
          <span>Sua thong tin ca nhan</span><span>›</span>
        </button>
        <button class="account-item" [class.active]="tab() === 'orders'" (click)="tab.set('orders')">
          <span>Don hang tung mua</span><span>›</span>
        </button>
        <button class="account-item" [class.active]="tab() === 'security'" (click)="tab.set('security')">
          <span>Doi mat khau</span><span>›</span>
        </button>
      </nav>

      <div class="account-content">
        <!-- Profile -->
        @if (tab() === 'profile') {
          <section class="account-panel">
            <form (ngSubmit)="saveProfile()" class="contact" style="padding:16px">
              <input class="input" type="text" name="name" placeholder="Ho va ten" [(ngModel)]="editName" required />
              <input class="input" type="email" [value]="user()?.email || ''" placeholder="Email (khong thay doi sau dang ky)" readonly />
              <input class="input" type="tel" [value]="user()?.phone || ''" placeholder="So dien thoai (khong thay doi)" readonly />
              <p class="muted">Dia chi mac dinh:</p>
              <textarea class="input" name="address" rows="3" placeholder="Dia chi giao hang..." [(ngModel)]="editAddress"></textarea>
              <button class="btn btn--pri" type="submit" [disabled]="saving()">
                {{ saving() ? 'Dang luu...' : 'Luu thong tin' }}
              </button>
              @if (acctMsg()) { <p class="muted" style="margin-top:8px">{{ acctMsg() }}</p> }
            </form>
          </section>
        }

        <!-- Orders -->
        @if (tab() === 'orders') {
          <section class="account-panel" style="padding:16px">
            <p class="muted">Xem toan bo lich su don hang cua ban.</p>
            <a routerLink="/orders" class="btn btn--pri" style="display:inline-block;margin-top:12px">Xem don hang</a>
          </section>
        }

        <!-- Password -->
        @if (tab() === 'security') {
          <section class="account-panel">
            <form (ngSubmit)="changePassword()" class="contact" style="padding:16px">
              <input class="input" type="password" name="current" placeholder="Mat khau hien tai" [(ngModel)]="oldPw" required />
              <input class="input" type="password" name="new" placeholder="Mat khau moi" [(ngModel)]="newPw" required />
              <input class="input" type="password" name="confirm" placeholder="Xac nhan mat khau moi" [(ngModel)]="confirmPw" required />
              <button class="btn btn--pri" type="submit" [disabled]="savingPw()">
                {{ savingPw() ? 'Dang xu ly...' : 'Doi mat khau' }}
              </button>
              @if (pwError()) { <p class="error-msg">{{ pwError() }}</p> }
              @if (pwMsg())   { <p class="muted" style="color:#2e7d32">{{ pwMsg() }}</p> }
            </form>
          </section>
        }
      </div>
    </div>

    <div class="drawer__foot" style="margin-top:16px">
      <button class="btn btn--danger" (click)="logout()">Dang xuat</button>
    </div>
  </div>
</main>
