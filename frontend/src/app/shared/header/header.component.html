<header class="header">
  <div class="container header__row">
    <!-- Logo -->
    <a routerLink="/" class="logo" aria-label="Trang chủ Vựa Vui Vẻ">
      <img
        src="/images/brand/LogoVVV.png"
        alt="Vựa Vui Vẻ"
        class="logo__img"
        onerror="
          this.style.display = 'none';
          this.nextElementSibling.style.display = 'inline';
        "
      />
      <span class="logo__text" style="display: none">Vựa Vui Vẻ</span>
    </a>

    <!-- Main nav -->
    <nav class="nav" aria-label="Điều hướng chính">
      <a routerLink="/products" class="nav-link" routerLinkActive="nav-link--active">Sản Phẩm</a>

      <a routerLink="/recipes" class="nav-link" routerLinkActive="nav-link--active">Công Thức</a>
      <a routerLink="/recommended" class="nav-link" routerLinkActive="nav-link--active"
        >Gợi Ý Cá Nhân</a
      >
      <a routerLink="/about" class="nav-link" routerLinkActive="nav-link--active">Giới Thiệu</a>
    </nav>

    <!-- Search -->
    <div class="header__search">
      <input
        type="search"
        placeholder="Tìm sản phẩm..."
        class="search-input"
        [(ngModel)]="searchQuery"
        (keyup.enter)="goSearch()"
      />
      <button class="search-btn" (click)="goSearch()" aria-label="Tìm kiếm">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </button>
    </div>

    <!-- Right actions -->
    <div class="header__right">
      @if (isLoggedIn()) {
        <div class="account-menu">
          <button type="button" class="btn--account" (click)="toggleAccountDropdown()">
            <span class="material-symbols-outlined g-icon">person</span>
            Tài Khoản
          </button>
          @if (showAccountDropdown()) {
            <div class="dropdown">
              <a
                routerLink="/account"
                class="dropdown-item"
                (click)="showAccountDropdown.set(false)"
                >Hồ sơ của tôi</a
              >
              <a routerLink="/orders" class="dropdown-item" (click)="showAccountDropdown.set(false)"
                >Đơn hàng của tôi</a
              >
              @if (isAdmin()) {
                <a
                  [href]="adminPortalUrl"
                  class="dropdown-item dropdown-item--admin"
                  (click)="showAccountDropdown.set(false)"
                  target="_blank"
                  rel="noopener noreferrer"
                  ><span class="material-symbols-outlined g-icon">admin_panel_settings</span> Quản
                  Lý</a
                >
              }
              <hr class="dropdown-divider" />
              <button type="button" class="dropdown-item text-danger" (click)="logout()">
                Đăng xuất
              </button>
            </div>
          }
        </div>
      } @else {
        <button type="button" class="btn--account" (click)="router.navigate(['/auth/login'])">
          <span class="material-symbols-outlined g-icon">login</span>
          Đăng Nhập
        </button>
      }

      <!-- Cart -->
      <button type="button" class="btn--cart" (click)="openCart()" aria-label="Giỏ hàng">
        <span class="material-symbols-outlined g-icon">shopping_cart</span>
        Giỏ Hàng
        @if (cartCount() > 0) {
          <span class="cart-badge">{{ cartCount() }}</span>
        }
      </button>
    </div>
  </div>
</header>
